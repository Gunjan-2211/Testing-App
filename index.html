<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Table & Token — Board Game Shelf</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root{
    --felt: #1f4a3d;
    --felt-dark: #163730;
    --walnut: #2e2015;
    --walnut-light: #4a3323;
    --parchment: #ede4d3;
    --parchment-dim: #d9cdb4;
    --brass: #c9a24b;
    --brass-bright: #e2c06f;
    --ember: #a63d40;
    --ink: #17140f;

    --font-display: "Fraunces", serif;
    --font-body: "Inter", sans-serif;
    --font-mono: "IBM Plex Mono", monospace;
  }

  *{ box-sizing: border-box; }
  html{ scroll-behavior: smooth; }

  body{
    margin:0;
    background: var(--felt);
    background-image:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,0.04), transparent 40%),
      repeating-linear-gradient(45deg, rgba(0,0,0,0.03) 0px, rgba(0,0,0,0.03) 2px, transparent 2px, transparent 6px);
    color: var(--parchment);
    font-family: var(--font-body);
    -webkit-font-smoothing: antialiased;
  }

  a{ color:inherit; }

  /* ---------- Header ---------- */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding: 22px clamp(20px, 5vw, 64px);
    border-bottom: 1px solid rgba(237,228,211,0.12);
    position: sticky;
    top:0;
    background: rgba(22,55,48,0.88);
    backdrop-filter: blur(8px);
    z-index: 50;
  }

  .logo{
    font-family: var(--font-display);
    font-weight: 700;
    font-size: 1.4rem;
    letter-spacing: 0.01em;
    display:flex;
    align-items:center;
    gap:10px;
  }
  .logo svg{ width:26px; height:26px; }

  nav{ display:flex; align-items:center; gap:28px; }
  nav .nav-links{ display:flex; gap:22px; font-size:0.92rem; }
  nav .nav-links a{
    text-decoration:none;
    color: var(--parchment-dim);
    transition: color .2s;
    padding-bottom: 3px;
    border-bottom: 1px solid transparent;
  }
  nav .nav-links a:hover, nav .nav-links a:focus-visible{
    color: var(--brass-bright);
    border-bottom-color: var(--brass-bright);
  }

  .search-wrap{
    position: relative;
    display:flex;
    align-items:center;
  }
  #search{
    background: rgba(237,228,211,0.08);
    border: 1px solid rgba(237,228,211,0.25);
    border-radius: 999px;
    color: var(--parchment);
    padding: 9px 16px 9px 36px;
    font-family: var(--font-body);
    font-size: 0.9rem;
    width: 190px;
    transition: width .25s, background .2s;
  }
  #search::placeholder{ color: rgba(237,228,211,0.5); }
  #search:focus{
    outline: 2px solid var(--brass-bright);
    outline-offset: 1px;
    width: 240px;
    background: rgba(237,228,211,0.12);
  }
  .search-wrap svg{
    position:absolute; left:12px; width:14px; height:14px;
    stroke: var(--parchment-dim);
  }

  @media (max-width: 720px){
    nav .nav-links{ display:none; }
  }

  /* ---------- Hero ---------- */
  .hero{
    padding: 72px clamp(20px, 5vw, 64px) 56px;
    position: relative;
    overflow: hidden;
  }
  .hero::before{
    content:"";
    position:absolute; inset:0;
    background: radial-gradient(ellipse 60% 50% at 80% 0%, rgba(201,162,75,0.14), transparent 60%);
    pointer-events:none;
  }
  .hero-inner{
    display:grid;
    grid-template-columns: 1.3fr 1fr;
    gap: 48px;
    align-items:center;
    max-width: 1180px;
    margin: 0 auto;
    position:relative;
  }
  @media (max-width: 880px){
    .hero-inner{ grid-template-columns: 1fr; }
  }

  .eyebrow{
    font-family: var(--font-mono);
    text-transform: uppercase;
    letter-spacing: 0.14em;
    font-size: 0.72rem;
    color: var(--brass-bright);
    margin: 0 0 14px;
  }

  h1{
    font-family: var(--font-display);
    font-size: clamp(2.4rem, 4.6vw, 3.8rem);
    line-height: 1.04;
    font-weight: 700;
    margin: 0 0 20px;
    color: var(--parchment);
  }
  h1 em{
    font-style: italic;
    color: var(--brass-bright);
  }

  .hero p.lede{
    font-size: 1.05rem;
    line-height: 1.6;
    color: var(--parchment-dim);
    max-width: 46ch;
    margin: 0 0 30px;
  }

  .filter-row{
    display:flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-bottom: 4px;
  }
  .chip{
    font-family: var(--font-mono);
    font-size: 0.76rem;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid rgba(237,228,211,0.28);
    background: transparent;
    color: var(--parchment-dim);
    cursor: pointer;
    transition: all .18s ease;
  }
  .chip:hover{ border-color: var(--brass-bright); color: var(--parchment); }
  .chip.active{
    background: var(--brass);
    border-color: var(--brass);
    color: var(--walnut);
    font-weight: 600;
  }
  .chip:focus-visible{ outline: 2px solid var(--brass-bright); outline-offset: 2px; }

  /* ---------- Dice roller (signature element) ---------- */
  .roller{
    display:flex;
    flex-direction: column;
    align-items:center;
    gap: 18px;
    background: rgba(46,32,21,0.55);
    border: 1px solid rgba(201,162,75,0.35);
    border-radius: 20px;
    padding: 34px 26px;
    text-align:center;
  }
  .die-btn{
    width: 88px; height: 88px;
    border-radius: 18px;
    border: none;
    background: linear-gradient(155deg, #f6ecd8, #cbb98a);
    box-shadow: 0 10px 24px rgba(0,0,0,0.35), inset 0 0 0 2px rgba(46,32,21,0.15);
    cursor: pointer;
    display:grid;
    place-items:center;
    position: relative;
    transition: transform .15s;
  }
  .die-btn:hover{ transform: translateY(-2px); }
  .die-btn:active{ transform: translateY(1px); }
  .die-btn:focus-visible{ outline: 3px solid var(--brass-bright); outline-offset: 3px; }
  .die-btn svg{ width: 46px; height:46px; }
  .die-btn.rolling{ animation: shake 0.55s ease; }
  @keyframes shake{
    0%{ transform: rotate(0deg); }
    20%{ transform: rotate(-18deg) translateX(-3px); }
    40%{ transform: rotate(14deg) translateX(3px); }
    60%{ transform: rotate(-10deg); }
    80%{ transform: rotate(6deg); }
    100%{ transform: rotate(0deg); }
  }
  .roller-label{
    font-family: var(--font-mono);
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--parchment-dim);
  }
  .roller-result{
    font-family: var(--font-display);
    font-size: 1.25rem;
    font-weight: 600;
    min-height: 1.6em;
    color: var(--brass-bright);
  }

  @media (prefers-reduced-motion: reduce){
    .die-btn.rolling{ animation: none; }
    html{ scroll-behavior: auto; }
  }

  /* ---------- Shelf / Grid ---------- */
  .shelf-section{
    padding: 20px clamp(20px, 5vw, 64px) 90px;
    max-width: 1280px;
    margin: 0 auto;
  }
  .shelf-heading{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom: 26px;
    border-bottom: 1px solid rgba(237,228,211,0.15);
    padding-bottom: 14px;
  }
  .shelf-heading h2{
    font-family: var(--font-display);
    font-size: 1.6rem;
    margin:0;
  }
  .shelf-count{
    font-family: var(--font-mono);
    font-size: 0.78rem;
    color: var(--parchment-dim);
  }

  .grid{
    display:grid;
    grid-template-columns: repeat(auto-fill, minmax(230px, 1fr));
    gap: 26px;
  }

  .box{
    background: var(--walnut-light);
    border-radius: 10px;
    padding: 0;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    border: 1px solid rgba(0,0,0,0.35);
    box-shadow: 0 6px 0 rgba(0,0,0,0.28), 0 14px 24px rgba(0,0,0,0.28);
    transition: transform .22s ease, box-shadow .22s ease;
    display:flex;
    flex-direction:column;
    opacity:0;
    transform: translateY(14px);
    animation: rise .5s ease forwards;
  }
  .box:nth-child(1){ animation-delay: .02s; }
  .box:nth-child(2){ animation-delay: .06s; }
  .box:nth-child(3){ animation-delay: .10s; }
  .box:nth-child(4){ animation-delay: .14s; }
  .box:nth-child(5){ animation-delay: .18s; }
  .box:nth-child(6){ animation-delay: .22s; }
  .box:nth-child(7){ animation-delay: .26s; }
  .box:nth-child(8){ animation-delay: .30s; }
  @keyframes rise{ to{ opacity:1; transform: translateY(0); } }

  .box:hover, .box:focus-visible{
    transform: translateY(-8px) rotate(-0.6deg);
    box-shadow: 0 6px 0 rgba(0,0,0,0.28), 0 22px 34px rgba(0,0,0,0.4);
  }
  .box:focus-visible{ outline: 2px solid var(--brass-bright); outline-offset: 3px; }
  .box.glow{
    box-shadow: 0 0 0 3px var(--brass-bright), 0 22px 34px rgba(0,0,0,0.4);
  }

  .box-spine{
    height: 8px;
    width:100%;
  }
  .box-face{
    padding: 20px 20px 18px;
    display:flex;
    flex-direction:column;
    gap: 12px;
    flex:1;
  }
  .box-cat{
    font-family: var(--font-mono);
    font-size: 0.66rem;
    text-transform:uppercase;
    letter-spacing: 0.1em;
    color: var(--brass-bright);
  }
  .box-icon{
    width: 42px; height:42px;
    display:grid; place-items:center;
    border-radius: 8px;
    background: rgba(237,228,211,0.06);
    margin-bottom: 2px;
  }
  .box-icon svg{ width:24px; height:24px; }
  .box h3{
    font-family: var(--font-display);
    font-size: 1.2rem;
    margin: 0;
    color: var(--parchment);
    line-height: 1.25;
  }
  .box p{
    font-size: 0.86rem;
    color: var(--parchment-dim);
    line-height: 1.5;
    margin:0;
    flex:1;
  }
  .box-stats{
    display:flex;
    gap: 14px;
    padding-top: 10px;
    border-top: 1px dashed rgba(237,228,211,0.2);
    font-family: var(--font-mono);
    font-size: 0.72rem;
    color: var(--parchment-dim);
  }
  .box-stats span{ display:flex; align-items:center; gap:5px; }
  .box-stats svg{ width:13px; height:13px; }

  .no-results{
    grid-column: 1/-1;
    text-align:center;
    padding: 50px 20px;
    color: var(--parchment-dim);
    font-family: var(--font-mono);
    font-size: 0.9rem;
  }

  /* ---------- Modal ---------- */
  .modal-backdrop{
    position: fixed; inset:0;
    background: rgba(10,8,5,0.72);
    display:flex; align-items:center; justify-content:center;
    padding: 24px;
    z-index: 100;
    opacity:0;
    pointer-events:none;
    transition: opacity .2s;
  }
  .modal-backdrop.open{ opacity:1; pointer-events:auto; }

  .modal{
    background: var(--felt-dark);
    border: 1px solid rgba(201,162,75,0.3);
    border-radius: 16px;
    max-width: 480px;
    width:100%;
    padding: 32px;
    position:relative;
    transform: translateY(16px) scale(0.98);
    transition: transform .22s;
    max-height: 84vh;
    overflow-y:auto;
  }
  .modal-backdrop.open .modal{ transform: translateY(0) scale(1); }

  .modal-close{
    position:absolute; top:16px; right:16px;
    background: none; border:none;
    color: var(--parchment-dim);
    cursor:pointer;
    width:32px; height:32px;
    border-radius: 8px;
    display:grid; place-items:center;
  }
  .modal-close:hover{ background: rgba(237,228,211,0.1); color: var(--parchment); }
  .modal-close:focus-visible{ outline: 2px solid var(--brass-bright); }

  .modal-cat{
    font-family: var(--font-mono);
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--brass-bright);
    margin-bottom: 10px;
  }
  .modal h2{
    font-family: var(--font-display);
    font-size: 1.7rem;
    margin: 0 0 14px;
  }
  .modal p.desc{
    color: var(--parchment-dim);
    line-height: 1.65;
    font-size: 0.95rem;
    margin: 0 0 22px;
  }
  .modal-meta{
    display:grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 22px;
  }
  .meta-card{
    background: rgba(237,228,211,0.06);
    border-radius: 10px;
    padding: 12px 10px;
    text-align:center;
  }
  .meta-card .val{
    font-family: var(--font-display);
    font-size: 1.15rem;
    color: var(--parchment);
  }
  .meta-card .lbl{
    font-family: var(--font-mono);
    font-size: 0.62rem;
    text-transform:uppercase;
    letter-spacing: 0.08em;
    color: var(--parchment-dim);
    margin-top: 4px;
  }
  .difficulty-track{
    display:flex; gap:5px; margin-bottom: 4px;
  }
  .difficulty-track span{
    flex:1; height:6px; border-radius:3px;
    background: rgba(237,228,211,0.15);
  }
  .difficulty-track span.fill{ background: var(--brass); }
  .modal-tags{ display:flex; flex-wrap:wrap; gap:8px; }
  .tag{
    font-family: var(--font-mono);
    font-size: 0.7rem;
    padding: 5px 10px;
    border-radius: 999px;
    background: rgba(166,61,64,0.18);
    color: #e4a5a3;
    border: 1px solid rgba(166,61,64,0.4);
  }

  footer{
    text-align:center;
    padding: 30px 20px 40px;
    font-family: var(--font-mono);
    font-size: 0.75rem;
    color: rgba(237,228,211,0.4);
    border-top: 1px solid rgba(237,228,211,0.1);
  }
</style>
</head>
<body>
    <h1>Gunjan sir ki ho</h1>
</body>
</html>
